<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚗 实时路况 → 望京西</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-size: 22px; font-weight: 700; color: #f8fafc; margin-bottom: 4px; }
    .header .subtitle { font-size: 13px; color: #64748b; }
    .header .api-tag { display:inline-block; font-size:11px; color:#38bdf8; background:#0c2d5a; padding:2px8px;border-radius:10px;margin-top:4px}

    /* 自动模式横幅 */
    .auto-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, #1e3a5f, #0f2d4a);
      border: 1px solid #2563eb44;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      gap: 10px;
    }
    .auto-banner.active { display: flex; }
    .auto-banner-left { flex: 1; }
    .auto-banner-title { font-size: 13px; font-weight: 600; color: #93c5fd; margin-bottom: 4px; }
    .auto-banner-sub   { font-size: 12px; color: #475569; }

    /* 倒计时圆环 */
    .countdown-ring { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
    .countdown-ring svg { transform: rotate(-90deg); }
    .countdown-ring .ring-bg   { fill: none; stroke: #1e293b; stroke-width: 4; }
    .countdown-ring .ring-fill { fill: none; stroke: #3b82f6; stroke-width: 4; stroke-linecap: round;
      stroke-dasharray: 125.66; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
    .countdown-ring .ring-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #38bdf8;
    }

    /* 时间区块 */
    .time-block { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
    .time-item { flex: 1; background: #0f172a; border-radius: 12px; padding: 14px 12px; text-align: center; }
    .time-item .label { font-size: 11px; color: #64748b; margin-bottom: 6px; letter-spacing: 0.5px; }
    .time-item .value { font-size: 20px; font-weight: 700; color: #38bdf8; }
    .time-item .value.eta { color: #34d399; }

    /* 路况结果 */
    .result-block { background: #0f172a; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e293b; }
    .result-row:last-child { border-bottom: none; }
    .result-row .rlabel { font-size: 13px; color: #94a3b8; }
    .result-row .rvalue { font-size: 15px; font-weight: 600; color: #f1f5f9; }
    .result-row .rvalue.highlight { color: #fbbf24; font-size: 22px; }

    /* 状态区 */
    .status-bar { text-align: center; font-size: 13px; color: #64748b; margin-bottom: 16px; min-height: 20px; }
    .status-bar.loading { color: #38bdf8; }
    .status-bar.error   { color: #f87171; }
    .status-bar.ok      { color: #34d399; }

    /* 按钮 */
    .btn-group { display: flex; gap: 10px; margin-top: 4px; }
    button {
      flex: 1; padding: 14px 10px; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active   { transform: scale(0.97); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-query { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; }
    .btn-push  { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
    .btn-stop  { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; display: none; }
    .btn-stop.show { display: block; }

    .push-log { margin-top: 12px; font-size: 12px; color: #475569; text-align: center; }

    /* 设置 */
    .settings-card { background: #1e293b; border-radius: 20px; padding: 20px 24px; width: 100%; max-width: 480px; }
    .settings-card h3 { font-size: 14px; color: #94a3b8; margin-bottom: 14px; font-weight: 600; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; color: #64748b; margin-bottom: 5px; }
    .field input {
      width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px;
      padding: 10px 12px; color: #e2e8f0; font-size: 13px; outline: none;
    }
    .field input:focus { border-color: #3b82f6; }
    .field input::placeholder { color: #475569; }

    /* 路线详情 */
    .detail-toggle { font-size: 12px; color: #3b82f6; cursor: pointer; text-align: center; padding: 8px 0 0; }
    .detail-steps { display: none; margin-top: 12px; font-size: 12px; color: #94a3b8; line-height: 1.7; max-height: 200px; overflow-y: auto; }
    .detail-steps.show { display: block; }
    .step-item { padding: 4px 0; border-bottom: 1px dashed #1e293b; }

    /* 徽章 */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-left: 6px; }
    .badge-smooth { background: #064e3b; color: #34d399; }
    .badge-slow   { background: #7c2d12; color: #fb923c; }
    .badge-jam    { background: #7f1d1d; color: #f87171; }

    /* 目的地 */
    .dest-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: #1e3a5f; border-radius: 8px; padding: 6px 12px;
      font-size: 13px; color: #93c5fd; margin-bottom: 16px;
    }

    /* API Key 提示 */
    .key-notice {
      background: #7c2d1215; border: 1px solid #7c2d1244; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: #fb923c;
      line-height: 1.6; text-align: center;
    }
    .key-notice a { color: #38bdf8; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>🚗 实时路况查询</h1>
    <p class="subtitle">当前位置 → 望京西</p>
    <span class="api-tag">🗺️ 高德地图 API</span>
  </div>

  <!-- 固定目的地 -->
  <div style="text-align:center">
    <span class="dest-tag">📍 终点：望京西地铁站（北京·朝阳）</span>
  </div>

  <div id="key-notice" class="key-notice" style="display:none">
    ⚠️ 请先在下方「设置」中填入<strong>高德地图 Web 服务 Key</strong><br/>
    免费申请 → <a href="https://console.amap.com/dev/key/app" target="_blank">console.amap.com</a>（30万次/天免费）
  </div>

  <!-- 自动模式横幅 -->
  <div class="auto-banner" id="auto-banner">
    <div class="auto-banner-left">
      <div class="auto-banner-title">🔄 自动循环模式已开启</div>
      <div class="auto-banner-sub" id="auto-banner-sub">每 5 分钟自动查询并推送微信</div>
    </div>
    <div class="countdown-ring" id="countdown-ring">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle class="ring-bg" cx="26" cy="26" r="20"/>
        <circle class="ring-fill" cx="26" cy="26" r="20" id="ring-fill"/>
      </svg>
      <div class="ring-text" id="ring-text">--</div>
    </div>
  </div>

  <!-- 时间显示 -->
  <div class="time-block">
    <div class="time-item">
      <div class="label">当前北京时间</div>
      <div class="value" id="now-time">--:--</div>
    </div>
    <div class="time-item">
      <div class="label">预计到达时间</div>
      <div class="value eta" id="eta-time">--:--</div>
    </div>
  </div>

  <!-- 路况结果 -->
  <div class="result-block">
    <div class="result-row">
      <span class="rlabel">🕐 预计用时</span>
      <span class="rvalue highlight" id="duration">-- 分钟</span>
    </div>
    <div class="result-row">
      <span class="rlabel">📏 行驶距离</span>
      <span class="rvalue" id="distance">-- km</span>
    </div>
    <div class="result-row">
      <span class="rlabel">🚦 路况状态</span>
      <span class="rvalue" id="traffic-status">待查询</span>
    </div>
    <div class="result-row">
      <span class="rlabel">📊 数据策略</span>
      <span class="rvalue" id="strategy-name" style="font-size:12px;color:#64748b">-</span>
    </div>
    <div class="result-row">
      <span class="rlabel">📍 当前位置</span>
      <span class="rvalue" id="my-location" style="font-size:12px;color:#64748b">待获取</span>
    </div>
    <div class="result-row">
      <span class="rlabel">📡 GPS精度</span>
      <span class="rvalue" id="gps-accuracy" style="font-size:12px;color:#64748b">-</span>
    </div>
    </div>
  </div>

  <!-- 路线详情 -->
  <div class="detail-toggle" id="detail-toggle" onclick="toggleDetail()" style="display:none">▼ 展开路线详情</div>
  <div class="detail-steps" id="detail-steps"></div>

  <div class="status-bar" id="status">点击「查询路况」开始</div>

  <div class="btn-group">
    <button class="btn-query" onclick="queryTraffic()" id="btn-query">🔍 查询路况</button>
    <button class="btn-push"  onclick="pushToWeChat()" id="btn-push" disabled>📲 推送到微信</button>
    <button class="btn-stop"  onclick="stopAuto()"     id="btn-stop">⏹ 停止</button>
  </div>

  <div class="push-log" id="push-log"></div>
</div>

<!-- 设置 -->
<div class="settings-card">
  <h3>⚙️ 设置</h3>
  <div class="field">
    <label>PushPlus Token（用于推送到微信，选填）</label>
    <input type="text" id="pushplus-token" placeholder="在 pushplus.plus 获取你的 Token" />
  </div>
  <div class="field">
    <label>自动循环间隔（分钟，默认 5）</label>
    <input type="number" id="auto-refresh" value="5" min="1" max="60" />
  </div>
  <div class="field">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
      <input type="checkbox" id="use-5ring" checked style="width:auto" />
      <span>强制走北五环（途经北苑桥 → 广顺桥）</span>
    </label>
  </div>
  <button class="btn-query" style="margin-top:4px" onclick="saveSettings()">💾 保存设置</button>
</div>

<script>
// ─── 配置 ─────────────────────────────────────────────────────────────────────
const DEST_LNG = 116.474124;  // 望京西 经度（GCJ02）
const DEST_LAT = 39.996031;   // 望京西 纬度（GCJ02）
const AMAP_API = "https://restapi.amap.com/v3/direction/driving";
const AMAP_CONVERT_API = "https://restapi.amap.com/v3/assistant/coordinate/convert";
const AMAP_KEY = "f3660021280033f17adb7fcdf2e0c5b9"; // 高德地图 Web 服务 Key（写死）
// 高德坐标格式：经度,纬度

const AUTO_INTERVAL_DEFAULT = 5;
// 北五环途经点（GCJ02坐标），用于强制走北五环
const WAYPOINT_5RING = "116.417510,40.021192;116.467309,40.015864"; // 北苑桥;广顺桥

let lastResult   = null;
let autoMode     = false;
let autoTimer    = null;
let countTimer   = null;
let nextRunAt    = null;
let autoInterval = AUTO_INTERVAL_DEFAULT;
let use5Ring     = true; // 默认走北五环

// ─── 设置存取 ─────────────────────────────────────────────────────────────────
function loadSettings() {
  document.getElementById("pushplus-token").value  = localStorage.getItem("pushplus_token") || "";
  document.getElementById("auto-refresh").value    = localStorage.getItem("auto_refresh") || String(AUTO_INTERVAL_DEFAULT);
  use5Ring = localStorage.getItem("use_5ring") !== "false"; // 默认true
  document.getElementById("use-5ring").checked = use5Ring;
}
}

function saveSettings() {
  localStorage.setItem("pushplus_token", document.getElementById("pushplus-token").value.trim());
  localStorage.setItem("auto_refresh",   document.getElementById("auto-refresh").value);
  localStorage.setItem("use_5ring",      document.getElementById("use-5ring").checked ? "true" : "false");
  use5Ring = document.getElementById("use-5ring").checked;
  setStatus("✅ 设置已保存", "ok");
}

// ─── 时间工具 ─────────────────────────────────────────────────────────────────
function getBJTimeStr(date) {
  const d = date || new Date();
  const parts = new Intl.DateTimeFormat("zh-CN", {
    timeZone: "Asia/Shanghai",
    hour: "2-digit", minute: "2-digit", hour12: false,
  }).formatToParts(d);
  return parts.find(p => p.type === "hour").value.padStart(2,"0")
       + ":"
       + parts.find(p => p.type === "minute").value.padStart(2,"0");
}
function updateClock() { document.getElementById("now-time").textContent = getBJTimeStr(); }

// ─── 倒计时圆环 ───────────────────────────────────────────────────────────────
const RING_CIRCUMFERENCE = 2 * Math.PI * 20;
function startCountdown(totalSeconds) {
  if (countTimer) clearInterval(countTimer);
  const fill = document.getElementById("ring-fill");
  const text = document.getElementById("ring-text");
  fill.style.strokeDasharray = RING_CIRCUMFERENCE;
  function tick() {
    const remaining = Math.max(0, Math.round((nextRunAt - Date.now()) / 1000));
    fill.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - remaining / totalSeconds);
    text.textContent = remaining >= 60 ? Math.ceil(remaining/60)+"m" : remaining+"s";
  }
  tick();
  countTimer = setInterval(tick, 1000);
}
function stopCountdown() {
  if (countTimer) { clearInterval(countTimer); countTimer = null; }
  document.getElementById("ring-text").textContent = "--";
  const f = document.getElementById("ring-fill"); if(f) f.style.strokeDashoffset=0;
}

// ─── WGS84 → GCJ02 坐标转换（GPS坐标 → 高德坐标） ──────────────────────────────
async function wgs84ToGcj02(lat, lng) {
  const params = new URLSearchParams({
    locations: `${lng},${lat}`,  // 高德格式：经度,纬度
    coordsys:  "gps",            // 输入为 WGS84（GPS原始坐标）
    output:    "json",
    key:       AMAP_KEY,
  });
  const resp = await fetch(`${AMAP_CONVERT_API}?${params}`);
  const data = await resp.json();
  if (data.status !== "1") throw new Error("坐标转换失败");
  // 返回格式："经度,纬度"
  const parts = data.locations.split(",");
  return { lng: parseFloat(parts[0]), lat: parseFloat(parts[1]) };
}

// ─── 高德驾车路线查询 ──────────────────────────────────────────────────────────
async function queryDriving(origLat, origLng) {
  const amapKey = AMAP_KEY;

  const params = new URLSearchParams({
    origin:      `${origLng},${origLat}`,
    destination: `${DEST_LNG},${DEST_LAT}`,
    strategy:    "2",                         // 距离最短策略
    extensions:  "all",
    output:      "json",
    key:         amapKey,
  });

  // 北五环途经点
  if (use5Ring) {
    params.set("waypoints", WAYPOINT_5RING);
  }

  const resp = await fetch(`${AMAP_API}?${params}`);
  const data  = await resp.json();

  if (data.status !== "1") throw new Error(data.info || `API 错误 (${data.infocode})`);
  return data;
}

// ─── 定位 ─────────────────────────────────────────────────────────────────────
// watchPosition 用于实时显示位置变化（UI展示用）
// getCurrentPosition 用于实际查询（要求精度高）
let watchId = null;
let currentPos = null;

function startWatching() {
  if (watchId !== null) return;
  if (!navigator.geolocation) return;

  watchId = navigator.geolocation.watchPosition(
    (pos) => { currentPos = pos; },
    (err) => { console.warn("[定位] watchPosition 错误:", err.message); },
    { timeout: 15000, enableHighAccuracy: true, maximumAge: 0 }
  );
}

// 获取高精度位置，如果精度不够会重试
function getPosition(maxRetries = 3) {
  return new Promise((resolve, reject) => {
    let attempts = 0;

    function tryGet() {
      attempts++;
      if (!navigator.geolocation) {
        reject(new Error("浏览器不支持定位"));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const acc = pos.coords.accuracy || 99999;
          if (acc > 200 && attempts < maxRetries) {
            // 精度不够，等3秒重试
            console.log(`[定位] 精度 ±${Math.round(acc)}m 不够(${attempts}/${maxRetries})，3秒后重试...`);
            setStatus(`📡 GPS 精度 ±${Math.round(acc)}m，${3}秒后重试(${attempts}/${maxRetries})...`, "loading");
            setTimeout(tryGet, 3000);
            return;
          }
          currentPos = pos; // 更新缓存
          resolve(pos);
        },
        (err) => {
          const msgs = {
            1: "未授权定位权限，请在手机设置中允许 Safari 访问位置",
            2: "无法获取位置，请检查 GPS",
            3: "定位超时",
          };
          reject(new Error(msgs[err.code] || "定位失败"));
        },
        { timeout: 15000, enableHighAccuracy: true, maximumAge: 0 }
      );
    }

    tryGet();
  });
}

// ─── 主查询 ───────────────────────────────────────────────────────────────────
async function queryTraffic() {
  const btnQ = document.getElementById("btn-query");
  btnQ.disabled = true;
  setStatus("📡 正在获取当前位置...", "loading");
  document.getElementById("btn-push").disabled = true;

  try {
    const pos     = await getPosition();
    const origLat = pos.coords.latitude;   // WGS84（GPS 原始坐标）
    const origLng = pos.coords.longitude;
    const accuracy = pos.coords.accuracy || 99999;

    document.getElementById("my-location").textContent =
      `${origLat.toFixed(4)}, ${origLng.toFixed(4)}`;

    // GPS 精度显示（getPosition 已确保精度≤200m，这里只做展示）
    const accEl = document.getElementById("gps-accuracy");
    if (accuracy <= 50) {
      accEl.textContent = `±${Math.round(accuracy)}m（精准）`;
      accEl.style.color = "#34d399";
    } else {
      accEl.textContent = `±${Math.round(accuracy)}m（可用）`;
      accEl.style.color = "#fbbf24";
    }

    // WGS84 → GCJ02 坐标转换（GPS坐标转高德坐标，否则路线规划会有偏移）
    setStatus("🔄 正在转换坐标（GPS → 高德）...", "loading");
    const gcj = await wgs84ToGcj02(origLat, origLng);
    console.log("[坐标转换] WGS84:", origLat, origLng, "→ GCJ02:", gcj.lat, gcj.lng,
                "偏移:", Math.round((gcj.lat - origLat)*111000), "m,", Math.round((gcj.lng - origLng)*111000*Math.cos(origLat*Math.PI/180)), "m");

    setStatus("🗺️ 正在高德地图查询实时路况...", "loading");

    const data = await queryDriving(gcj.lat, gcj.lng);

    // 解析高德返回结果
    const route = data.route;
    // paths[0] 是最优方案
    const path = route.paths[0];

    // 调试：在控制台输出完整 API 响应
    console.log("[路况API] 完整响应:", JSON.stringify(data, null, 2));
    console.log("[路况API] strategy:", path.strategy, "| distance:", path.distance, "m | duration:", path.duration, "s");

    const distance    = parseInt(path.distance);   // 米
    const duration    = parseInt(path.duration);   // 秒（高德返回的是字符串）
    const tolls       = parseInt(path.tolls || 0); // 过路费
    const tollDistance = parseInt(path.toll_distance || 0);

    const durationMin = Math.round(duration / 60);
    const distanceKm  = (distance / 1000).toFixed(1);

    // ETA：用当前时间（UTC毫秒）+ 预计耗时（秒），再用北京时间显示
    const etaDate = new Date(Date.now() + duration * 1000);
    const etaStr  = getBJTimeStr(etaDate);
    console.log("[路况API] ETA计算: 当前Date.now()=" + Date.now() + " + duration=" + duration + "s = etaDate=" + etaDate.toISOString() + " => 北京时间 " + etaStr);

    // 路况判断：高德直接提供了每个 step 的 traffic_color
    // 用整体速度估算
    const speedKmh = distance > 0 && duration > 0 ? (distance / duration) * 3.6 : 0;
    let trafficLabel, trafficBadge;
    if      (speedKmh >= 40) { trafficLabel = "畅通 🟢"; trafficBadge = '<span class="badge badge-smooth">畅通</span>'; }
    else if (speedKmh >= 20) { trafficLabel = "缓行 🟡"; trafficBadge = '<span class="badge badge-slow">缓行</span>'; }
    else                     { trafficLabel = "拥堵 🔴"; trafficBadge = '<span class="badge badge-jam">拥堵</span>'; }

    // 更新 UI
    document.getElementById("duration").textContent     = `${durationMin} 分钟`;
    document.getElementById("distance").textContent     = `${distanceKm} km`;
    document.getElementById("traffic-status").innerHTML = trafficBadge;
    document.getElementById("eta-time").textContent     = etaStr;
    document.getElementById("strategy-name").textContent = path.strategy || "实时路况";

    // 路线步骤（高德返回 tmcs 数组，每个元素有 status 字段）
    if (path.steps && path.steps.length > 0) {
      document.getElementById("detail-steps").innerHTML =
        path.steps.map((s, i) => {
          let roadInfo = s.road || s.instruction || "行驶";
          const distM  = parseInt(s.distance || 0);
          // 从 tmcs 数组提取路况（高德返回中文 status：畅通/缓行/拥堵/严重拥堵）
          const tmcs = s.tmcs || [];
          let worstStatus = "未知";
          let tmcIcon = "⚪";
          const statusRank = { "畅通": 0, "未知": 0, "缓行": 1, "拥堵": 2, "严重拥堵": 3 };
          for (const t of tmcs) {
            if ((statusRank[t.status] || 0) > (statusRank[worstStatus] || 0)) {
              worstStatus = t.status;
            }
          }
          if (worstStatus === "畅通" || worstStatus === "未知") tmcIcon = "🟢";
          else if (worstStatus === "缓行") tmcIcon = "🟡";
          else if (worstStatus === "拥堵") tmcIcon = "🟠";
          else if (worstStatus === "严重拥堵") tmcIcon = "🔴";
          return `<div class="step-item">${i+1}. ${roadInfo} · ${distM>=1000?(distM/1000).toFixed(1)+"km":distM+"m"} ${tmcIcon} ${worstStatus!=="未知"?worstStatus:""}</div>`;
        }).join("");
      document.getElementById("detail-toggle").style.display = "block";
    }

    lastResult = {
      durationMin, distanceKm, trafficLabel,
      origLat, origLng, etaStr,
      speedKmh: speedKmh.toFixed(1),
      tollFee: (tolls / 100).toFixed(2),
      hasTolls: tolls > 0,
    };

    setStatus(`✅ 查询成功 · 平均时速约 ${speedKmh.toFixed(0)} km/h`, "ok");

    const hasToken = !!localStorage.getItem("pushplus_token");
    document.getElementById("btn-push").disabled = !hasToken;

    // 自动模式：查完自动推送
    if (autoMode && hasToken) {
      await pushToWeChat(true);
    }

  } catch (err) {
    setStatus(`❌ ${err.message}`, "error");
    console.error(err);
  } finally {
    btnQ.disabled = false;
  }
}

// ─── 自动循环 ─────────────────────────────────────────────────────────────────
function startAuto() {
  autoMode = true;
  autoInterval = parseInt(localStorage.getItem("auto_refresh") || String(AUTO_INTERVAL_DEFAULT), 10)
                 || AUTO_INTERVAL_DEFAULT;

  document.getElementById("auto-banner").classList.add("active");
  document.getElementById("auto-banner-sub").textContent =
    `每 ${autoInterval} 分钟自动查询并推送微信`;
  document.getElementById("btn-stop").classList.add("show");

  queryTraffic();
  scheduleNext();
}

function scheduleNext() {
  if (autoTimer) clearInterval(autoTimer);
  const ms = autoInterval * 60 * 1000;
  nextRunAt = Date.now() + ms;
  startCountdown(autoInterval * 60);
  autoTimer = setInterval(() => {
    queryTraffic();
    nextRunAt = Date.now() + ms;
    startCountdown(autoInterval * 60);
  }, ms);
}

function stopAuto() {
  autoMode = false;
  if (autoTimer)  { clearInterval(autoTimer);  autoTimer  = null; }
  stopCountdown();
  document.getElementById("auto-banner").classList.remove("active");
  document.getElementById("btn-stop").classList.remove("show");
  setStatus("⏹ 自动循环已停止", "ok");
}

// ─── 推送微信（PushPlus） ─────────────────────────────────────────────────────
async function pushToWeChat(silent = false) {
  const token = (localStorage.getItem("pushplus_token") || "").trim();
  if (!token) { if (!silent) setStatus("❌ 请先填写 PushPlus Token", "error"); return; }
  if (!lastResult) { if (!silent) setStatus("❌ 请先查询路况", "error"); return; }

  const btnP = document.getElementById("btn-push");
  if (!silent) { btnP.disabled = true; setStatus("📲 正在推送到微信...", "loading"); }

  const timeStr = getBJTimeStr();
  const content = `
<h3>🚗 望京西路况播报</h3>
<p><b>查询时间：</b>${timeStr}（北京时间）</p>
<p><b>预计用时：</b>${lastResult.durationMin} 分钟</p>
<p><b>行驶距离：</b>${lastResult.distanceKm} km</p>
<p><b>预计到达：</b>${lastResult.etaStr}</p>
<p><b>路况状态：</b>${lastResult.trafficLabel}</p>
<p><b>平均时速：</b>约 ${lastResult.speedKmh} km/h</p>
${lastResult.hasTolls ? `<p><b>过路费预估：</b>¥${lastResult.tollFee}</p>` : ""}
<hr/>
<p style="color:gray;font-size:12px">起点坐标：${lastResult.origLat.toFixed(4)}, ${lastResult.origLng.toFixed(4)}<br/>终点：望京西地铁站<br/>数据来源：高德地图</p>
  `.trim();

  try {
    const resp = await fetch("https://www.pushplus.plus/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        token,
        title: `🚗 望京西 | ${lastResult.durationMin}分钟 · ${lastResult.trafficLabel}`,
        content,
        template: "html",
      }),
    });
    const json = await resp.json();
    if (json.code === 200) {
      if (!silent) setStatus("✅ 推送成功！请查看微信", "ok");
      document.getElementById("push-log").textContent = `上次推送：${getBJTimeStr()}`;
    } else {
      throw new Error(json.msg || "推送失败");
    }
  } catch(e) {
    if (!silent) setStatus(`❌ 推送失败：${e.message}`, "error");
    else         setStatus(`⚠️ 推送失败：${e.message}`, "error");
  } finally {
    if (!silent) btnP.disabled = false;
  }
}

// ─── 折叠详情 ─────────────────────────────────────────────────────────────────
function toggleDetail() {
  const el  = document.getElementById("detail-steps");
  const btn = document.getElementById("detail-toggle");
  el.classList.toggle("show");
  btn.textContent = el.classList.contains("show") ? "▲ 收起路线详情" : "▼ 展开路线详情";
}

// ─── 工具 ─────────────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status-bar " + (type || "");
}

// ─── 初始化 ───────────────────────────────────────────────────────────────────
loadSettings();
setInterval(updateClock, 1000);
updateClock();

// 启动持续位置监听（确保每次查询用的是最新位置）
startWatching();

(function checkAutoMode() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("auto") === "1") setTimeout(startAuto, 800);
})();
</script>
